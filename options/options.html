<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClipVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root,
      :root[data-theme='dark'] {
        --bg: #0a0e1a;
        --surface: rgba(14, 20, 38, 0.9);
        --text: #e8ecf4;
        --text-muted: #7b8aa8;
        --border: rgba(120, 160, 255, 0.15);
        --accent: #00d4ff;
        --accent-2: #7c5cff;
        --input-bg: rgba(0, 0, 0, 0.25);
        --log-bg: #06080f;
        --log-text: #a8b4cc;
      }
      :root[data-theme='light'] {
        --bg: #f0f3fa;
        --surface: rgba(255, 255, 255, 0.92);
        --text: #0f1528;
        --text-muted: #5a6478;
        --border: rgba(80, 100, 180, 0.2);
        --accent: #0099cc;
        --accent-2: #6b4ce6;
        --input-bg: rgba(255, 255, 255, 0.95);
        --log-bg: #e8ecf4;
        --log-text: #4d5d7a;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Outfit', system-ui, sans-serif;
        background: var(--bg);
        background-image:
          radial-gradient(ellipse 80% 50% at 0% 0%, rgba(0, 212, 255, 0.08), transparent),
          radial-gradient(ellipse 60% 40% at 100% 100%, rgba(124, 92, 255, 0.1), transparent);
        color: var(--text);
        padding: 28px;
        max-width: 640px;
        margin: 0 auto;
        line-height: 1.5;
        min-height: 100vh;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 24px;
        background: linear-gradient(135deg, #00d4ff, #7c5cff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      h2 {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        color: var(--accent);
        margin: 24px 0 12px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }
      .field { margin-bottom: 14px; }
      label { display: block; font-size: 13px; margin-bottom: 4px; }
      input[type='number'], input[type='text'], input[type='password'], select {
        width: 100%;
        max-width: 280px;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 13px;
        background: var(--input-bg);
        color: var(--text);
      }
      .switch { display: flex; align-items: center; gap: 8px; }
      .excluded-list { margin-top: 8px; }
      .excluded-item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
        font-size: 13px;
      }
      .btn {
        padding: 8px 14px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        margin-right: 8px;
        margin-top: 8px;
      }
      .btn-primary {
        background: linear-gradient(135deg, #00d4ff, #7c5cff);
        color: #fff;
        box-shadow: 0 4px 16px rgba(0, 212, 255, 0.25);
      }
      .btn-secondary {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
      }
      .btn-danger { background: rgba(255, 92, 122, 0.15); color: #ff8fa3; border: 1px solid rgba(255, 92, 122, 0.35); }
      .actions { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }
      .status { margin-top: 12px; font-size: 13px; color: #3dffa8; }
      .privacy { font-size: 12px; color: var(--text-muted); margin-top: 24px; padding: 12px; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); }
      .field-hint { font-size: 12px; color: var(--text-muted); margin: 6px 0 14px; max-width: 420px; line-height: 1.45; }
      #error-log { margin-top: 12px; max-height: 200px; overflow: auto; font-size: 11px; background: var(--log-bg); color: var(--log-text); padding: 10px; border-radius: 6px; display: none; white-space: pre-wrap; border: 1px solid var(--border); }
    </style>
  </head>
  <body>
    <h1 data-i18n="optionsTitle"></h1>

    <h2 data-i18n="optionsLanguage"></h2>
    <div class="field">
      <label data-i18n="optionsLanguage"></label>
      <select id="language">
        <option value="auto" data-i18n="langAuto"></option>
        <option value="en" data-i18n="langEn"></option>
        <option value="zh_CN" data-i18n="langZh"></option>
      </select>
    </div>

    <h2 data-i18n="optionsAppearance"></h2>
    <p class="field-hint" data-i18n="optAppearanceHint"></p>
    <div class="field">
      <label data-i18n="optAppearanceMode"></label>
      <select id="theme" data-i18n-options="themeSystem,themeLight,themeDark">
        <option value="system"></option>
        <option value="light"></option>
        <option value="dark"></option>
      </select>
    </div>

    <h2 data-i18n="optionsGeneral"></h2>
    <div class="field">
      <label data-i18n="optMaxHistory"></label>
      <input type="number" id="maxHistorySize" min="10" max="10000" />
    </div>
    <div class="field">
      <label data-i18n="optMaxLength"></label>
      <input type="number" id="maxItemLength" min="500" max="50000" />
    </div>
    <div class="field">
      <label data-i18n="optAutoDelete"></label>
      <input type="number" id="autoDeleteDays" min="1" max="365" />
    </div>
    <div class="field">
      <label data-i18n="optDefaultSort"></label>
      <select id="defaultSort" data-i18n-options="sortTimeDesc,sortTimeAsc,sortCharCount,sortSource">
        <option value="time_desc"></option>
        <option value="time_asc"></option>
        <option value="char_count"></option>
        <option value="source"></option>
      </select>
    </div>
    <h2 data-i18n="optionsFloatingBall"></h2>
    <p class="privacy" data-i18n="optFbHint"></p>
    <div class="field switch">
      <input type="checkbox" id="fbEnabled" />
      <label for="fbEnabled" data-i18n="optFbEnable"></label>
    </div>
    <div class="field switch">
      <input type="checkbox" id="fbShrunk" />
      <label for="fbShrunk" data-i18n="optFbShrink"></label>
    </div>
    <div class="field switch">
      <input type="checkbox" id="fbClearPermanent" />
      <label for="fbClearPermanent" data-i18n="optFbClearPermanent"></label>
    </div>
    <div class="field">
      <label data-i18n="optFbDisabledSites"></label>
      <div class="excluded-list" id="fbDisabledList"></div>
    </div>

    <h2 data-i18n="optionsMonitor"></h2>
    <div class="field switch">
      <input type="checkbox" id="enableAutoMonitor" />
      <label for="enableAutoMonitor" data-i18n="optEnableMonitor"></label>
    </div>
    <div class="field">
      <label data-i18n="optDuplicateInterval"></label>
      <input type="number" id="duplicateIntervalSec" min="5" max="600" />
    </div>
    <div class="field">
      <label data-i18n="optExcludedSites"></label>
      <div class="excluded-list" id="excludedList"></div>
      <input type="text" id="newExcluded" data-i18n-placeholder="excludedPlaceholder" />
      <button type="button" class="btn btn-secondary" id="addExcluded" data-i18n="btnAddSite"></button>
    </div>

    <h2 data-i18n="optionsSearch"></h2>
    <div class="field switch">
      <input type="checkbox" id="searchCaseSensitive" />
      <label for="searchCaseSensitive" data-i18n="optSearchCase"></label>
    </div>
    <div class="field switch">
      <input type="checkbox" id="searchUseRegex" />
      <label for="searchUseRegex" data-i18n="optSearchRegex"></label>
    </div>

    <h2 data-i18n="optionsAI"></h2>
    <p class="privacy" data-i18n="optAiPrivacy"></p>
    <div class="field switch">
      <input type="checkbox" id="aiEnabled" />
      <label for="aiEnabled" data-i18n="optAiEnable"></label>
    </div>
    <div class="field">
      <label data-i18n="optAiChannel"></label>
      <select id="aiChannel" data-i18n-options="aiChannelChrome,aiChannelAPI">
        <option value="chrome"></option>
        <option value="openai"></option>
      </select>
      <p class="field-hint" data-i18n="optAiChromeLimit"></p>
    </div>
    <div class="field ai-openai-field">
      <label data-i18n="optAiProvider"></label>
      <select id="aiProvider" data-i18n-options="aiProvOpenAI,aiProvDeepSeek,aiProvZhipu,aiProvQwen,aiProvMoonshot,aiProvOllama,aiProvCustom">
        <option value="openai"></option>
        <option value="deepseek"></option>
        <option value="zhipu"></option>
        <option value="qwen"></option>
        <option value="moonshot"></option>
        <option value="ollama"></option>
        <option value="custom"></option>
      </select>
    </div>
    <div class="field ai-openai-field">
      <label data-i18n="optAiApiKey"></label>
      <input type="password" id="aiOpenaiApiKey" />
      <p class="field-hint" data-i18n="optAiApiKeyHint"></p>
    </div>
    <div class="field ai-openai-field">
      <label data-i18n="optAiModel"></label>
      <input type="text" id="aiOpenaiModel" />
    </div>
    <div class="field ai-openai-field">
      <label data-i18n="optAiEndpoint"></label>
      <input type="text" id="aiOpenaiEndpoint" />
      <p class="field-hint" data-i18n="optAiEndpointHint"></p>
    </div>
    <h3 data-i18n="optionsAIFeatures" style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent-2);margin:16px 0 10px;text-transform:uppercase;letter-spacing:0.1em;"></h3>
    <div class="field switch">
      <input type="checkbox" id="aiAutoTag" />
      <label for="aiAutoTag" data-i18n="optAiAutoTag"></label>
    </div>
    <div class="field switch">
      <input type="checkbox" id="aiSmartSearch" />
      <label for="aiSmartSearch" data-i18n="optAiSmartSearch"></label>
    </div>
    <div class="field switch">
      <input type="checkbox" id="aiTranslate" />
      <label for="aiTranslate" data-i18n="optAiTranslate"></label>
    </div>
    <div class="field switch">
      <input type="checkbox" id="aiRewrite" />
      <label for="aiRewrite" data-i18n="optAiRewrite"></label>
    </div>
    <div class="field">
      <label data-i18n="optAiRateLimit"></label>
      <input type="number" id="aiRateLimit" min="1" max="60" />
    </div>
    <div class="field">
      <label data-i18n="optAiOutputLang"></label>
      <select id="aiLanguage" data-i18n-options="langAuto,langEn,langZh">
        <option value="auto"></option>
        <option value="en"></option>
        <option value="zh_CN"></option>
      </select>
    </div>
    <div class="field" style="display:flex;align-items:center;gap:12px;">
      <button type="button" class="btn btn-secondary" id="testAiBtn" data-i18n="optAiTest"></button>
      <span id="aiStatusText" class="status" hidden></span>
    </div>

    <h2 data-i18n="optionsData"></h2>
    <button type="button" class="btn btn-secondary" id="exportBtn" data-i18n="btnExport"></button>
    <button type="button" class="btn btn-secondary" id="importBtn" data-i18n="btnImport"></button>
    <input type="file" id="importFile" accept=".json" hidden />
    <button type="button" class="btn btn-secondary" id="viewLogsBtn" data-i18n="btnViewLogs"></button>
    <button type="button" class="btn btn-secondary" id="clearLogsBtn" data-i18n="btnClearLogs"></button>
    <button type="button" class="btn btn-danger" id="clearAllBtn" data-i18n="btnClearAll"></button>
    <pre id="error-log"></pre>

    <div class="actions">
      <button type="button" class="btn btn-primary" id="saveBtn" data-i18n="btnSave"></button>
      <p class="status" id="status" hidden></p>
    </div>

    <p class="privacy" data-i18n="privacyNote"></p>

    <script type="module" src="options.js"></script>
  </body>
</html>
